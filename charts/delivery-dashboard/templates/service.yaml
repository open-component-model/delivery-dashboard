apiVersion: v1
kind: Service
metadata:
  name: delivery-dashboard
  namespace: {{ .Values.target_namespace | default .Release.Namespace }}
  labels:
    app: delivery-dashboard
spec:
  type: ClusterIP
  ports:
  - port: {{ default 8080 .Values.servicePort }}
    targetPort: {{ default 8080 .Values.containerPort }}
    name: default
  selector:
    app: delivery-dashboard
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: delivery-dashboard
  namespace: {{ .Values.target_namespace | default .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ default "open-delivery-gear" .Values.gatewayName }}
  hostnames:
    - {{ .Values.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: delivery-dashboard
          port: {{ default 8080 .Values.servicePort }}
